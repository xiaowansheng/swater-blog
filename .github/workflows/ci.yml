name: CI

on:
  # Temporarily disabled auto CI; run manually from GitHub Actions when needed.
  workflow_dispatch:

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check repo hygiene
      run: bash scripts/repo-hygiene.sh

  test-backend:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: blog_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x blog-service/gradlew
      
    - name: Run tests
      run: |
        cd blog-service
        ./gradlew test --info
      env:
        SPRING_PROFILES_ACTIVE: test
        DB_HOST: localhost
        DB_PORT: 3306
        DB_NAME: blog_test
        DB_USER: root
        DB_PASSWORD: root
        REDIS_HOST: localhost
        REDIS_PORT: 6379
    
    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Backend Tests
        path: blog-service/build/test-results/test/*.xml
        reporter: java-junit
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: blog-service/build/reports/jacoco/test/jacocoTestReport.xml
        flags: backend

  check-frontend-admin:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: blog-admin/pnpm-lock.yaml
    
    - name: Install dependencies
      run: |
        cd blog-admin
        pnpm install
    
    - name: Run linting
      run: |
        cd blog-admin
        pnpm run lint

  build-frontend-admin:
    runs-on: ubuntu-latest
    needs: check-frontend-admin
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: blog-admin/pnpm-lock.yaml
    
    - name: Build admin frontend
      run: |
        cd blog-admin
        pnpm install
        pnpm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: frontend-admin-dist
        path: blog-admin/dist/

  check-frontend-web:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: blog-web/pnpm-lock.yaml
    
    - name: Install dependencies
      run: |
        cd blog-web
        pnpm install
    
    - name: Run linting
      run: |
        cd blog-web
        pnpm run lint

  build-frontend-web:
    runs-on: ubuntu-latest
    needs: check-frontend-web
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: blog-web/pnpm-lock.yaml
    
    - name: Build web frontend
      run: |
        cd blog-web
        pnpm install
        pnpm run build

  build-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build with Gradle
      run: |
        cd blog-service
        chmod +x gradlew
        ./gradlew clean build -x test
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: backend-jar
        path: blog-service/build/libs/*.jar

  security-scan:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend-admin, build-frontend-web]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
