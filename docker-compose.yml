# ========================================
# Swater Blog 完整部署方案
# 包含前端、后端和所有依赖服务
# ========================================

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: swater-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root_password}
      MYSQL_DATABASE: ${DB_NAME:-blog}
      MYSQL_USER: ${DB_USER:-blog}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me_db_password}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone='+08:00'
      --performance-schema=off
      --innodb-buffer-pool-size=64M
      --max-connections=20
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: swater-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLISHED_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - blog-network
    # 限制容器内存（宿主机保护）
    mem_limit: 96m

    # 同时限制 Redis 自己可用内存（避免 Redis 顶满容器导致 OOM）
    command: >
      sh -c "
        EXTRA_ARGS='--maxmemory 64mb --maxmemory-policy allkeys-lru';
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-server --requirepass \"$$REDIS_PASSWORD\" $$EXTRA_ARGS;
        else
          redis-server $$EXTRA_ARGS;
        fi
      "
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RabbitMQ消息队列
  rabbitmq:
    build:
      context: ./docker/rabbitmq
      dockerfile: Dockerfile
      args:
        RABBITMQ_VER: ${RABBITMQ_VER:-3-management-alpine}
    image: swater-rabbitmq:${RABBITMQ_VER:-3-management-alpine}
    container_name: swater-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me_rabbitmq_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - blog-network
    # 限制容器内存（宿主机保护）
    mem_limit: 320m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch搜索引擎 - 暂时禁用
  # elasticsearch:
  #   image: elasticsearch:8.11.0
  #   container_name: swater-elasticsearch
  #   restart: unless-stopped
  #   ports:
  #     - "9200:9200"
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #     - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
  #   volumes:
  #     - elasticsearch_data:/usr/share/elasticsearch/data
  #   networks:
  #     - blog-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # 后端服务
  blog-service:
    build:
      context: ./blog-service
      dockerfile: Dockerfile
    container_name: swater-blog-service
    user: "0"
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-blog}
      DB_USER: ${DB_USER:-blog}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_db_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change_me_rabbitmq_password}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      # ES_URIS: ${ES_URIS:-http://elasticsearch:9200}  # 暂时禁用ES
      ES_USERNAME: ${ES_USERNAME:-}
      ES_PASSWORD: ${ES_PASSWORD:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      AMAP_KEY: ${AMAP_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      AUTH_EMAIL_SESSION_SECRET: ${AUTH_EMAIL_SESSION_SECRET:-}
      BLOG_BOOTSTRAP_ADMIN_USERNAME: ${BLOG_BOOTSTRAP_ADMIN_USERNAME:-admin}
      BLOG_BOOTSTRAP_ADMIN_PASSWORD: ${BLOG_BOOTSTRAP_ADMIN_PASSWORD:-}
      BLOG_BOOTSTRAP_ADMIN_EMAIL: ${BLOG_BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      REVALIDATE_TOKEN: ${REVALIDATE_TOKEN:-}
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-local}
      FILE_STORAGE_LOCAL_PATH: ${FILE_STORAGE_LOCAL_PATH:-/app/uploads}
      FILE_STORAGE_LOCAL_URL_PREFIX: ${FILE_STORAGE_LOCAL_URL_PREFIX:-/uploads}
      SERVER_PORT: ${SERVER_PORT:-8888}
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
    volumes:
      - blog_logs:/app/logs
      - blog_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      # elasticsearch:
      #   condition: service_healthy  # 暂时禁用ES
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 管理后台前端
  blog-admin:
    build:
      context: ./blog-admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
        VITE_UPLOAD_URL: ${VITE_UPLOAD_URL:-/api/upload}
        VITE_UPLOAD_RESOURCE_PREFIX: ${VITE_UPLOAD_RESOURCE_PREFIX:-/uploads}
        VITE_UPLOAD_MAX_SIZE: ${VITE_UPLOAD_MAX_SIZE:-10485760}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-博客管理系统}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_STORAGE_PREFIX: ${VITE_STORAGE_PREFIX:-blog_admin_}
        VITE_MOCK_ENABLED: ${VITE_MOCK_ENABLED:-false}
        VITE_BLOG_URL: ${VITE_BLOG_URL:-https://blog.example.com}
        VITE_GITHUB_URL: ${VITE_GITHUB_URL:-https://github.com/xiaowansheng/swater-blog}
    container_name: swater-blog-admin
    restart: unless-stopped
    ports:
      - "${BLOG_ADMIN_PUBLISHED_PORT:-3001}:80"
    depends_on:
      blog-service:
        condition: service_healthy
    networks:
      - blog-network

  # 博客前端
  blog-web:
    build:
      context: ./blog-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/}
        NEXT_PUBLIC_UPLOAD_RESOURCE_PREFIX: ${NEXT_PUBLIC_UPLOAD_RESOURCE_PREFIX:-/uploads}
        NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://blog.example.com}
        SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://blog-service:8888}
        REVALIDATE_TOKEN: ${REVALIDATE_TOKEN:-}
    container_name: swater-blog-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/}
      NEXT_PUBLIC_UPLOAD_RESOURCE_PREFIX: ${NEXT_PUBLIC_UPLOAD_RESOURCE_PREFIX:-/uploads}
      NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://blog.example.com}
      SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://blog-service:8888}
      REVALIDATE_TOKEN: ${REVALIDATE_TOKEN:-}
    ports:
      - "${BLOG_WEB_PUBLISHED_PORT:-3000}:3000"
    depends_on:
      blog-service:
        condition: service_healthy
    networks:
      - blog-network

  # Nginx Proxy - Automatic SSL
  nginx-proxy:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.proxy
      args:
        PROXY_VER: ${PROXY_VER:-1.6}
    image: swater-nginx-proxy:${PROXY_VER:-1.6}
    container_name: swater-nginx-proxy
    profiles:
      - https
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - dhparam:/etc/nginx/dhparam
      - certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - blog-network
    restart: unless-stopped

  # ACME Companion - Automatic Let's Encrypt
  acme-companion:
    image: nginxproxy/acme-companion:${ACME_VER:-2.5}
    container_name: swater-nginx-proxy-acme
    depends_on:
      - nginx-proxy
    profiles:
      - https
    volumes:
      # 关键：显式给予读写权限 (:rw)，用于生成验证文件和写入证书
      - certs:/etc/nginx/certs:rw
      - vhost:/etc/nginx/vhost.d:rw
      - html:/usr/share/nginx/html:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DEFAULT_EMAIL=${ACME_EMAIL:-user@example.com}
      # 强制指定代理容器名，防止自动识别错误
      - NGINX_PROXY_CONTAINER=${NGINX_PROXY_CONTAINER:-swater-nginx-proxy}
    networks:
      - blog-network
    restart: unless-stopped

  # Nginx反向代理（HTTPS 模式：通过 nginx-proxy）
  nginx-https:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: swater-nginx:local
    container_name: swater-nginx-https
    profiles:
      - https
    expose:
      - "80"
    environment:
      # 告诉 Proxy：所有的域名都转给我！
      VIRTUAL_HOST: ${ALL_DOMAINS:-admin.local,web.local}
      LETSENCRYPT_HOST: ${ALL_DOMAINS:-admin.local,web.local}
      LETSENCRYPT_EMAIL: ${ACME_EMAIL:-user@example.com}
      NGINX_ADMIN_DOMAIN: ${NGINX_ADMIN_DOMAIN:-admin.local}
      NGINX_WEB_DOMAIN: ${NGINX_WEB_DOMAIN:-web.local}
    restart: unless-stopped
    volumes:
      - blog_uploads:/var/www/uploads:ro
    depends_on:
      blog-service:
        condition: service_healthy
      blog-admin:
        condition: service_healthy
      blog-web:
        condition: service_healthy
    networks:
      - blog-network

  # Nginx反向代理（HTTP 模式：直连）
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: swater-nginx:local
    container_name: swater-nginx
    profiles:
      - http
    ports:
      - "80:80"
    environment:
      NGINX_ADMIN_DOMAIN: ${NGINX_ADMIN_DOMAIN:-admin.local}
      NGINX_WEB_DOMAIN: ${NGINX_WEB_DOMAIN:-web.local}
    restart: unless-stopped
    volumes:
      - blog_uploads:/var/www/uploads:ro
    depends_on:
      blog-service:
        condition: service_healthy
      blog-admin:
        condition: service_healthy
      blog-web:
        condition: service_healthy
    networks:
      - blog-network

# 数据卷
volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  # elasticsearch_data:  # 暂时禁用ES
  blog_logs:
  blog_uploads:
  # Nginx Proxy Volumes
  conf:
  vhost:
  html:
  dhparam:
  certs:
  acme:

# 网络
networks:
  blog-network:
    driver: bridge





