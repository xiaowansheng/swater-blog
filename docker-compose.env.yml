# ========================================
# 开发环境基础服务
# 包含 MySQL、Redis、RabbitMQ
# Elasticsearch暂时禁用
# ========================================

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root_password}
      MYSQL_DATABASE: ${DB_NAME:-blog}
      MYSQL_USER: ${DB_USER:-blog}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me_db_password}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone='+08:00'
      --performance-schema=off
      --innodb-buffer-pool-size=64M
      --max-connections=20
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - blog-network
    # 限制容器内存（宿主机保护）
    mem_limit: 96m

    # 同时限制 Redis 自己可用内存（避免 Redis 顶满容器导致 OOM）
    command: >
      sh -c "
        EXTRA_ARGS='--maxmemory 64mb --maxmemory-policy allkeys-lru';
        if [ -n \"$REDIS_PASSWORD\" ]; then
          redis-server --requirepass \"$REDIS_PASSWORD\" $$EXTRA_ARGS;
        else
          redis-server $$EXTRA_ARGS;
        fi
      "
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: blog-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP端口
      - "15672:15672"  # 管理界面端口
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me_rabbitmq_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - blog-network
    # 限制容器内存（宿主机保护）
    mem_limit: 320m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch搜索引擎 - 暂时禁用
  # elasticsearch:
