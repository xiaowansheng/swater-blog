# 数据卷
volumes:
  mysql_dev_data:
  redis_dev_data:
  rabbitmq_dev_data:
  blog_logs_dev:
  blog_uploads_dev:
  # elasticsearch_dev_data:  # 暂时禁用ES

# 网络
networks:
  blog-dev-network:
    driver: bridge
