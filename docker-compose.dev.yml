# ========================================
# 开发环境服务（基础依赖 + 后端服务）
# 包含 MySQL、Redis、RabbitMQ、blog-service
# Elasticsearch暂时禁用
# ========================================

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: blog-mysql-dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123456}
      MYSQL_DATABASE: ${DB_NAME:-blog}
      MYSQL_USER: ${DB_USER:-blog}
      MYSQL_PASSWORD: ${DB_PASSWORD:-blog123456}
      TZ: Asia/Shanghai
    volumes:
      - mysql_dev_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone='+08:00'
      --innodb-buffer-pool-size=256M
      --max-connections=200
    networks:
      - blog-dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: blog-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_dev_data:/data
    networks:
      - blog-dev-network
    command: >
      sh -c "
        if [ -n \"$REDIS_PASSWORD\" ]; then
          redis-server --requirepass \"$REDIS_PASSWORD\";
        else
          redis-server;
        fi
      "
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: blog-rabbitmq-dev
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP端口
      - "15672:15672"  # 管理界面端口
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    networks:
      - blog-dev-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端服务
  blog-service:
    build:
      context: ./blog-service
      dockerfile: Dockerfile
    container_name: blog-service-dev
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-blog}
      DB_USER: ${DB_USER:-blog}
      DB_PASSWORD: ${DB_PASSWORD:-blog123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin123}
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      AMAP_KEY: ${AMAP_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-swater_blog_jwt_secret_key_2024}
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-local}
      SERVER_PORT: ${SERVER_PORT:-8888}
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
    volumes:
      - blog_logs_dev:/app/logs
      - blog_uploads_dev:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - blog-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Elasticsearch搜索引擎 - 暂时禁用
