# ========================================
# Blog Web 单独部署配置
# 仅包含前端 Web 应用
# ========================================

services:
  blog-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      # API 后端地址（需要根据实际情况配置）
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8888}
    networks:
      - blog-web-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: blog-web-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx-web.conf:/etc/nginx/conf.d/blog-web.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL 证书目录（如果需要 HTTPS）
    depends_on:
      - blog-web
    networks:
      - blog-web-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  blog-web-network:
    driver: bridge
