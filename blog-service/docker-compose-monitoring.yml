services:
  # Prometheus - 指标收集
  prometheus:
    image: prom/prometheus:latest
    container_name: blog-prometheus
    ports:
      - "${PROMETHEUS_PUBLISHED_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - monitoring
    restart: unless-stopped

  # Grafana - 监控面板
  grafana:
    image: grafana/grafana:latest
    container_name: blog-grafana
    ports:
      - "${GRAFANA_PUBLISHED_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus

  # AlertManager - 告警管理
  alertmanager:
    image: prom/alertmanager:latest
    container_name: blog-alertmanager
    ports:
      - "${ALERTMANAGER_PUBLISHED_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=${ALERTMANAGER_EXTERNAL_URL:-http://localhost:9093}'
    networks:
      - monitoring
    restart: unless-stopped

  # Node Exporter - 系统指标
  node-exporter:
    image: prom/node-exporter:latest
    container_name: blog-node-exporter
    ports:
      - "${NODE_EXPORTER_PUBLISHED_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring
    restart: unless-stopped

  # MySQL Exporter - MySQL指标
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: blog-mysql-exporter
    ports:
      - "${MYSQL_EXPORTER_PUBLISHED_PORT:-9104}:9104"
    environment:
      - DATA_SOURCE_NAME=root:${DB_ROOT_PASSWORD:-change_me_root_password}@(mysql:3306)/${DB_NAME:-blog}
    networks:
      - monitoring
      - default
    restart: unless-stopped
    depends_on:
      - mysql

  # Redis Exporter - Redis指标
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: blog-redis-exporter
    ports:
      - "${REDIS_EXPORTER_PUBLISHED_PORT:-9121}:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - monitoring
      - default
    restart: unless-stopped
    depends_on:
      - redis

  # 为了演示，这里包含基础服务
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root_password}
      MYSQL_DATABASE: ${DB_NAME:-blog}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - default
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    ports:
      - "${REDIS_PUBLISHED_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - default
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  mysql_data:
  redis_data:

networks:
  monitoring:
    driver: bridge
  default:
    driver: bridge
