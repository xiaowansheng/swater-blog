groups:
  - name: blog-service-alerts
    rules:
      # API响应时间告警
      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, http_server_requests_seconds_bucket{job="blog-service"}) > 0.5
        for: 2m
        labels:
          severity: warning
          service: blog-service
        annotations:
          summary: "Blog服务API响应时间过高"
          description: "95%的请求响应时间超过500ms，当前值: {{ $value }}s"

      # 错误率告警
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5..",job="blog-service"}[5m]) / rate(http_server_requests_seconds_count{job="blog-service"}[5m]) > 0.01
        for: 1m
        labels:
          severity: critical
          service: blog-service
        annotations:
          summary: "Blog服务错误率过高"
          description: "5xx错误率超过1%，当前值: {{ $value | humanizePercentage }}"

      # JVM内存使用告警
      - alert: HighJVMMemoryUsage
        expr: jvm_memory_used_bytes{area="heap",job="blog-service"} / jvm_memory_max_bytes{area="heap",job="blog-service"} > 0.85
        for: 5m
        labels:
          severity: warning
          service: blog-service
        annotations:
          summary: "Blog服务JVM堆内存使用率过高"
          description: "堆内存使用率超过85%，当前值: {{ $value | humanizePercentage }}"

      # GC时间告警
      - alert: HighGCTime
        expr: rate(jvm_gc_pause_seconds_sum{job="blog-service"}[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          service: blog-service
        annotations:
          summary: "Blog服务GC时间过长"
          description: "GC时间占比超过10%，当前值: {{ $value | humanizePercentage }}"

      # 数据库连接告警
      - alert: HighDatabaseConnections
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.8
        for: 2m
        labels:
          severity: warning
          service: mysql
        annotations:
          summary: "MySQL连接数过高"
          description: "数据库连接使用率超过80%，当前值: {{ $value | humanizePercentage }}"

      # 慢查询告警
      - alert: HighSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: mysql
        annotations:
          summary: "MySQL慢查询过多"
          description: "慢查询频率过高，当前值: {{ $value }}/s"

      # Redis内存使用告警
      - alert: HighRedisMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis内存使用率过高"
          description: "Redis内存使用率超过90%，当前值: {{ $value | humanizePercentage }}"

      # 服务不可用告警
      - alert: ServiceDown
        expr: up{job="blog-service"} == 0
        for: 1m
        labels:
          severity: critical
          service: blog-service
        annotations:
          summary: "Blog服务不可用"
          description: "Blog服务已停止响应超过1分钟"

      # 磁盘空间告警
      - alert: HighDiskUsage
        expr: (node_filesystem_size_bytes - node_filesystem_avail_bytes) / node_filesystem_size_bytes > 0.9
        for: 5m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "磁盘空间不足"
          description: "磁盘使用率超过90%，挂载点: {{ $labels.mountpoint }}"

      # CPU使用率告警
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "CPU使用率过高"
          description: "CPU使用率超过80%，当前值: {{ $value }}%"