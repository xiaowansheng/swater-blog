# ========================================
# RabbitMQ配置文件
# Blog服务消息队列配置
# ========================================

# 网络配置
listeners.tcp.default = 5672
management.tcp.port = 15672

# 日志配置
log.console = true
log.console.level = info
log.file = /var/log/rabbitmq/rabbit.log
log.file.level = info
log.file.rotation.date = $D0
log.file.rotation.size = 10485760

# 内存配置
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.5

# 磁盘配置
disk_free_limit.relative = 2.0

# 集群配置（单节点模式）
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@localhost

# 默认用户配置
default_user = blog
default_pass = blog123456
default_user_tags.administrator = true
default_vhost = /

# 权限配置
default_permissions.configure = .*
default_permissions.read = .*
default_permissions.write = .*

# 管理插件
management.load_definitions = /etc/rabbitmq/definitions.json

# 性能配置
channel_max = 2047
connection_backlog = 128
heartbeat = 60
frame_max = 131072

# 队列配置
queue_master_locator = min-masters

# 消息持久化
mnesia_table_loading_retry_timeout = 30000
mnesia_table_loading_retry_limit = 10

# SSL配置（生产环境建议启用）
# ssl_options.cacertfile = /etc/rabbitmq/ssl/ca_certificate.pem
# ssl_options.certfile = /etc/rabbitmq/ssl/server_certificate.pem
# ssl_options.keyfile = /etc/rabbitmq/ssl/server_key.pem
# ssl_options.verify = verify_peer
# ssl_options.fail_if_no_peer_cert = true

# 插件配置
# 启用管理插件
management.rates_mode = basic

# 启用延迟消息插件（如果需要）
# delayed_message.max_delayed_messages = 20000

# 启用Shovel插件（如果需要）
# shovel.endpoints.source.uri = amqp://guest:guest@source-broker:5672
# shovel.endpoints.destination.uri = amqp://guest:guest@destination-broker:5672

# 启用Federation插件（如果需要）
# federation.upstream.source.uri = amqp://guest:guest@upstream-broker:5672

# 监控配置
collect_statistics = coarse
collect_statistics_interval = 5000

# 策略配置
# 高可用队列策略
# policy.ha-all.pattern = .*
# policy.ha-all.definition.ha-mode = all
# policy.ha-all.definition.ha-sync-mode = automatic

# TTL策略
# policy.ttl.pattern = ttl\..*
# policy.ttl.definition.message-ttl = 60000

# 死信队列策略
# policy.dlx.pattern = dlx\..*
# policy.dlx.definition.dead-letter-exchange = dlx

# 限流配置
# policy.max-length.pattern = max-length\..*
# policy.max-length.definition.max-length = 10000

# 内存和磁盘阈值
# policy.memory.pattern = memory\..*
# policy.memory.definition.max-length-bytes = 1073741824

# 网络分区处理
cluster_partition_handling = ignore

# 认证配置
auth_mechanisms.1 = PLAIN
auth_mechanisms.2 = AMQPLAIN

# 授权配置
auth_backends.1 = internal

# 限制配置
max_message_size = 134217728

# 连接配置
tcp_listen_options.backlog = 128
tcp_listen_options.nodelay = true
tcp_listen_options.linger.on = true
tcp_listen_options.linger.timeout = 0
tcp_listen_options.exit_on_close = false

# 统计配置
delegate_count = 16
tcp_listeners.1 = 5672

# 管理界面配置
management.http_log_dir = /var/log/rabbitmq/management
management.rates_mode = basic

# Prometheus监控配置（如果启用）
# prometheus.tcp.port = 15692
# prometheus.path = /metrics
# prometheus.format = prometheus_text

# 追踪配置
# tracing.user = admin