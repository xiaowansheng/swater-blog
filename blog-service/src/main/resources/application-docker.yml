# ========================================
# Docker环境Spring Boot配置
# 针对容器化部署优化
# ========================================

server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    # Docker环境连接器配置
    threads:
      max: 100
      min-spare: 10
    connection-timeout: 20000
    max-connections: 500
    accept-count: 100
    # Docker环境访问日志
    accesslog:
      enabled: true
      directory: /app/logs
      pattern: '%h %l %u %t "%r" %s %b %D'
      file-date-format: .yyyy-MM-dd
      prefix: access_log
      suffix: .log

spring:
  application:
    name: blog-docker
  profiles:
    active: docker

  # Docker环境数据源配置 - 使用环境变量
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:blog}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:blog}
    password: ${DB_PASSWORD:blog123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # Docker环境连接池配置
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1
      auto-commit: true

      # Docker环境连接参数
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false

  # JPA配置 - Docker环境
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境不自动更新表结构
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        dialect: org.hibernate.dialect.MySQL8Dialect

  # SQL初始化
  sql:
    init:
      mode: never  # Docker环境不执行初始化脚本
      continue-on-error: false

  # Docker环境Redis配置 - 使用环境变量
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms
        shutdown-timeout: 100ms

  # Docker环境RabbitMQ配置 - 使用环境变量
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:admin123}
    virtual-host: /
    connection-timeout: 15000
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 2
        max-concurrency: 5
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
          multiplier: 1.0

  # Docker环境邮件配置 - 使用环境变量
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          timeout: 25000
          connection-timeout: 25000
          write-timeout: 25000

  # Elasticsearch配置 - 使用环境变量
  elasticsearch:
    uris: ${ES_URIS:http://elasticsearch:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

# 文件存储配置 - Docker环境
file:
  storage:
    type: ${FILE_STORAGE_TYPE:local}
    local:
      path: /app/uploads
      url-prefix: /uploads
    oss:
      endpoint: ${OSS_ENDPOINT:}
      access-key-id: ${OSS_ACCESS_KEY_ID:}
      access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
      bucket-name: ${OSS_BUCKET_NAME:}
      domain: ${OSS_DOMAIN:}

# 通知配置 - Docker环境
notification:
  channels: 
    - websocket
    - email
  email:
    enabled: true
  websocket:
    enabled: true

# 邮件配置
email:
  provider:
    type: spring-mail
  from: ${MAIL_USERNAME:}
  from-name: Swater Blog
  templates:
    path: classpath:templates/email/

# 位置服务配置 - Docker环境
location:
  provider:
    type: amap
  amap:
    key: ${AMAP_KEY:}
    api-url: https://restapi.amap.com/v3/ip

# 搜索引擎配置
search:
  provider:
    type: elasticsearch  # Docker环境使用Elasticsearch

# 消息队列配置
mq:
  provider:
    type: rabbitmq

# 定时任务配置
scheduler:
  provider:
    type: spring

# 评论系统配置
comment:
  provider:
    type: builtin

# 日志存储配置
log:
  storage:
    type: mysql

# MyBatis Plus配置 - Docker环境
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.blog.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl  # 生产环境不输出SQL
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    auto-mapping-behavior: partial
    auto-mapping-unknown-column-behavior: warning
    default-executor-type: reuse
    default-statement-timeout: 25
    default-fetch-size: 100
    safe-row-bounds-enabled: false
    local-cache-scope: session
    jdbc-type-for-null: other
    lazy-load-trigger-methods: equals,clone,hashCode,toString
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      select-strategy: not_empty
      insert-strategy: not_null
      update-strategy: not_null

# Sa-Token配置 - Docker环境
sa-token:
  token-name: Authorization
  timeout: 2592000  # 30天
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false  # 生产环境关闭日志
  jwt-secret-key: ${JWT_SECRET_KEY:swater_blog_jwt_secret_key_2024}

# 日志配置 - Docker环境
logging:
  level:
    root: INFO
    com.blog: INFO
    org.springframework.web: WARN
    org.mybatis: WARN
    com.zaxxer.hikari: WARN
    org.springframework.security: WARN
    org.springframework.transaction: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: /app/logs/application.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 3GB

# 监控配置 - Docker环境
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true
    shutdown:
      enabled: false  # 生产环境禁用远程关闭
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
  health:
    redis:
      enabled: true
    db:
      enabled: true
    rabbit:
      enabled: true
    diskspace:
      enabled: true
      threshold: 1GB

# 安全配置 - Docker环境
security:
  rate-limit:
    enabled: true
    default-window: 60
    default-limit: 100
  sql-injection:
    enabled: true
    log-attacks: true
  xss-protection:
    enabled: true
    sanitize-input: true
  file-upload:
    max-size: 10MB
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - pdf
      - doc
      - docx
    blocked-extensions:
      - exe
      - bat
      - cmd
      - sh
      - jsp
      - php
  ip-blacklist:
    enabled: false
    ips: []
  data-masking:
    enabled: true
    log-sensitive-data: false

# SpringDoc OpenAPI配置 - Docker环境
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    display-operation-id: true
    default-models-expand-depth: 1
    default-model-expand-depth: 1
    doc-expansion: none
    filter: true
    show-extensions: true
    show-common-extensions: true
    try-it-out-enabled: true
  group-configs:
    - group: 'public'
      display-name: '公开接口'
      paths-to-match: '/api/public/**'
    - group: 'admin'
      display-name: '管理接口'
      paths-to-match: '/api/admin/**'
    - group: 'auth'
      display-name: '认证接口'
      paths-to-match: '/api/auth/**'
    - group: 'monitoring'
      display-name: '监控接口'
      paths-to-match: '/api/monitoring/**'
  show-actuator: true

# 自定义健康检查配置
health:
  custom:
    enabled: true