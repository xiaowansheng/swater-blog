server:
  servlet:
    context-path: /

spring:
  application:
    name: blog
  profiles:
    active: test
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP连接池优化配置
    hikari:
      # 连接池配置
      maximum-pool-size: 20          # 最大连接数
      minimum-idle: 5                # 最小空闲连接数
      idle-timeout: 300000           # 空闲连接超时时间(5分钟)
      max-lifetime: 1800000          # 连接最大生存时间(30分钟)
      connection-timeout: 30000      # 连接超时时间(30秒)
      validation-timeout: 5000       # 连接验证超时时间(5秒)
      leak-detection-threshold: 60000 # 连接泄漏检测阈值(60秒)
      
      # 连接属性优化
      connection-test-query: SELECT 1
      auto-commit: true
      
      # MySQL连接参数优化
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: false
  
  data:
    redis:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  rabbitmq:
    username: guest
    password: guest
    virtual-host: /
  
  mail:
    host: smtp.qq.com
    port: 587
    username: your-email@qq.com
    password: your-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

file:
  storage:
    type: local
    local:
      path: uploads
      url-prefix: /uploads
    oss:
      endpoint: 
      access-key-id: 
      access-key-secret: 
      bucket-name: 
      domain: 
    qiniu:
      access-key: 
      secret-key: 
      bucket: 
      domain: 

notification:
  channels: 
    - websocket
    - email
  email:
    enabled: false
  websocket:
    enabled: true

email:
  provider:
    type: spring-mail
  from: your-email@qq.com
  from-name: Swater Blog
  templates:
    path: classpath:templates/email/

location:
  provider:
    type: amap
  amap:
    key: 
    api-url: https://restapi.amap.com/v3/ip
  baidu:
    ak: 
    api-url: https://api.map.baidu.com/location/ip
  ip2location:
    db-path:

# 搜索引擎插件配置
search:
  provider:
    type: database  # database/elasticsearch/mysql-fulltext/solr

# 消息队列插件配置
mq:
  provider:
    type: rabbitmq  # rabbitmq/kafka/rocketmq

# 定时任务插件配置
scheduler:
  provider:
    type: spring  # spring/quartz

# 评论系统插件配置
comment:
  provider:
    type: builtin  # builtin/gitalk/disqus

# 日志存储插件配置
log:
  storage:
    type: mysql  # mysql/file/elk/loki 

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.blog.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 查询优化配置
    cache-enabled: true                    # 启用二级缓存
    lazy-loading-enabled: true             # 启用延迟加载
    aggressive-lazy-loading: false         # 关闭积极的延迟加载
    multiple-result-sets-enabled: true     # 允许多结果集
    use-column-label: true                 # 使用列标签
    use-generated-keys: true               # 使用生成的主键
    auto-mapping-behavior: partial         # 自动映射行为
    auto-mapping-unknown-column-behavior: warning  # 未知列行为
    default-executor-type: reuse           # 默认执行器类型
    default-statement-timeout: 25          # 默认语句超时时间
    default-fetch-size: 100                # 默认获取大小
    safe-row-bounds-enabled: false         # 安全行边界
    map-underscore-to-camel-case: true     # 下划线转驼峰
    local-cache-scope: session             # 本地缓存作用域
    jdbc-type-for-null: other              # NULL值的JDBC类型
    lazy-load-trigger-methods: equals,clone,hashCode,toString  # 延迟加载触发方法
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 性能优化配置
      select-strategy: not_empty           # 查询策略
      insert-strategy: not_null            # 插入策略
      update-strategy: not_null            # 更新策略

sa-token:
  token-name: Authorization
  timeout: 2592000
  activity-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  jwt-secret-key: blog-secret-key-change-in-production

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# 性能监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
  health:
    redis:
      enabled: true
    db:
      enabled: true
    rabbit:
      enabled: true

# 自定义健康检查配置
health:
  custom:
    enabled: true

