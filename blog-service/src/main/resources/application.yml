# ========================================
# Spring Boot 主配置文件
# 只包含环境激活配置，具体配置在各环境配置文件中
# ========================================

spring:
  profiles:
    # 激活的环境配置：dev(开发) / docker(容器) / prod(生产)
    active: ${SPRING_PROFILES_ACTIVE:dev}

blog:
  bootstrap:
    admin:
      username: ${BLOG_BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${BLOG_BOOTSTRAP_ADMIN_PASSWORD:}
      email: ${BLOG_BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
