server:
  servlet:
    context-path: /

spring:
  application:
    name: blog
  profiles:
    active: test
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: false
  
  data:
    redis:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  rabbitmq:
    username: guest
    password: guest
    virtual-host: /
  
  mail:
    host: smtp.qq.com
    port: 587
    username: your-email@qq.com
    password: your-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

file:
  storage:
    type: local
    local:
      path: uploads
      url-prefix: /uploads
    oss:
      endpoint: 
      access-key-id: 
      access-key-secret: 
      bucket-name: 
      domain: 
    qiniu:
      access-key: 
      secret-key: 
      bucket: 
      domain: 

notification:
  channels: 
    - websocket
    - email
  email:
    enabled: false
  websocket:
    enabled: true

email:
  provider:
    type: spring-mail
  from: your-email@qq.com
  from-name: Swater Blog
  templates:
    path: classpath:templates/email/

location:
  provider:
    type: amap
  amap:
    key: 
    api-url: https://restapi.amap.com/v3/ip
  baidu:
    ak: 
    api-url: https://api.map.baidu.com/location/ip
  ip2location:
    db-path:

# 搜索引擎插件配置
search:
  provider:
    type: database  # database/elasticsearch/mysql-fulltext/solr

# 消息队列插件配置
mq:
  provider:
    type: rabbitmq  # rabbitmq/kafka/rocketmq

# 定时任务插件配置
scheduler:
  provider:
    type: spring  # spring/quartz

# 评论系统插件配置
comment:
  provider:
    type: builtin  # builtin/gitalk/disqus

# 日志存储插件配置
log:
  storage:
    type: mysql  # mysql/file/elk/loki 

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.blog.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 2592000
  activity-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  jwt-secret-key: blog-secret-key-change-in-production

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# 性能监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
  health:
    redis:
      enabled: true
    db:
      enabled: true
    rabbit:
      enabled: true

# 自定义健康检查配置
health:
  custom:
    enabled: true

