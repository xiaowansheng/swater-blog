# ========================================
# 生产环境Spring Boot配置
# 针对生产部署优化，注重性能和安全
# ========================================

server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: blog-prod

  mvc:
    servlet:
      path: /api
  tomcat:
    # 生产环境连接器配置
    threads:
      max: 200
      min-spare: 20
    connection-timeout: 20000
    max-connections: 1000
    accept-count: 200
    # 生产环境访问日志
    accesslog:
      enabled: true
      directory: /var/log/blog
      pattern: '%h %l %u %t "%r" %s %b %D'
      file-date-format: .yyyy-MM-dd
      prefix: access_log
      suffix: .log
      rotate: true
  # Thymeleaf 模板配置
  thymeleaf:
    prefix: classpath:templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: true  # 生产环境启用缓存
  
  # Jackson 日期格式化配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  
  # 配置多部分上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # 生产环境数据源配置 - 使用环境变量
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # 生产环境连接池配置
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1
      auto-commit: true
      
      # 生产环境连接参数优化
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false
  
  # JPA配置 - 生产环境
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境不自动更新表结构
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        dialect: org.hibernate.dialect.MySQL8Dialect
  
  # SQL初始化
  sql:
    init:
      mode: never  # 生产环境不执行初始化脚本
      continue-on-error: false
      separator: ";"
      encoding: utf-8
  
  # 生产环境Redis配置 - 使用环境变量
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4
          max-wait: 3000ms
        shutdown-timeout: 100ms
  
  # 生产环境RabbitMQ配置 - 使用环境变量
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: 15000
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 3
        max-concurrency: 10
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
          multiplier: 1.0
  
  # 生产环境邮件配置 - 使用环境变量
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from-name: ${MAIL_FROM_NAME:Swater Blog}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          timeout: 25000
          connection-timeout: 25000
          write-timeout: 25000

# 文件存储配置 - 生产环境
file:
  storage:
    type: ${FILE_STORAGE_TYPE:oss}
    local:
      path: ${FILE_STORAGE_PATH:/var/blog/uploads}
      url-prefix: /uploads
    oss:
      endpoint: ${OSS_ENDPOINT}
      access-key-id: ${OSS_ACCESS_KEY_ID}
      access-key-secret: ${OSS_ACCESS_KEY_SECRET}
      bucket-name: ${OSS_BUCKET_NAME}
      domain: ${OSS_DOMAIN}
    qiniu:
      access-key: ${QINIU_ACCESS_KEY:}
      secret-key: ${QINIU_SECRET_KEY:}
      bucket: ${QINIU_BUCKET:}
      domain: ${QINIU_DOMAIN:}

# 通知配置 - 生产环境
notification:
  email:
    enabled: true
  websocket:
    enabled: true

# 邮件插件配置
email:
  provider:
    type: spring-mail

# 位置服务配置 - 生产环境
location:
  provider:
    type: ${LOCATION_PROVIDER:amap}
  amap:
    key: ${AMAP_KEY}
    api-url: https://restapi.amap.com/v3/ip
  baidu:
    ak: ${BAIDU_AK:}
    api-url: https://api.map.baidu.com/location/ip
  ip2location:
    db-path: ${IP2LOCATION_DB_PATH:}

# 搜索引擎配置
search:
  provider:
    type: ${SEARCH_TYPE:elasticsearch}  # 生产环境使用Elasticsearch

# 消息队列配置
mq:
  provider:
    type: ${MQ_TYPE:rabbitmq}

# 定时任务配置
scheduler:
  provider:
    type: spring

# 评论系统配置
comment:
  provider:
    type: ${COMMENT_PROVIDER:builtin}

# 日志存储配置
log:
  storage:
    type: ${LOG_STORAGE_TYPE:mysql}

# MyBatis Plus配置 - 生产环境
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.blog.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl  # 生产环境不输出SQL
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    auto-mapping-behavior: partial
    auto-mapping-unknown-column-behavior: warning
    default-executor-type: reuse
    default-statement-timeout: 25
    default-fetch-size: 100
    safe-row-bounds-enabled: false
    local-cache-scope: session
    jdbc-type-for-null: other
    lazy-load-trigger-methods: equals,clone,hashCode,toString
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      select-strategy: not_empty
      insert-strategy: not_null
      update-strategy: not_null

# Sa-Token配置 - 生产环境
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: -1
  active-timeout: 86400
  is-read-timeout: true
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false  # 生产环境关闭日志
  jwt-secret-key: ${JWT_SECRET_KEY}

# 认证配置 - 生产环境
auth:
  email-session:
    secret: ${AUTH_EMAIL_SESSION_SECRET}
    ttl-seconds: 2592000
    header-name: X-Verify-Token

# API 资源配置 - 生产环境
api-resource:
  auto-refresh-on-startup: true

# 日志配置 - 生产环境
logging:
  level:
    root: WARN
    com.blog: INFO
    org.springframework.web: WARN
    org.mybatis: WARN
    com.zaxxer.hikari: WARN
    org.springframework.security: WARN
    org.springframework.transaction: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: /var/log/blog/application.log
    max-size: 100MB
    max-history: 60
    total-size-cap: 10GB

# 监控配置 - 生产环境
management:
  server:
    port: ${MANAGEMENT_PORT:8081}  # 监控服务独立端口
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true
    shutdown:
      enabled: false  # 生产环境禁用远程关闭
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
    tags:
      application: ${spring.application.name}
      environment: prod
  health:
    redis:
      enabled: true
    db:
      enabled: true
    rabbit:
      enabled: true
    diskspace:
      enabled: true
      threshold: 5GB

# 安全配置 - 生产环境
security:
  rate-limit:
    enabled: true
    default-window: 60
    default-limit: 100
  sql-injection:
    enabled: true
    log-attacks: true
  xss-protection:
    enabled: true
    sanitize-input: true
  file-upload:
    max-size: 10MB
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - pdf
      - doc
      - docx
    blocked-extensions:
      - exe
      - bat
      - cmd
      - sh
      - jsp
      - php
      - js
  ip-blacklist:
    enabled: ${IP_BLACKLIST_ENABLED:false}
    ips: ${IP_BLACKLIST:}
  data-masking:
    enabled: true
    log-sensitive-data: false

# SpringDoc OpenAPI配置 - 生产环境
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}  # 生产环境默认关闭
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}  # 生产环境默认关闭
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    display-operation-id: false
    default-models-expand-depth: 1
    default-model-expand-depth: 1
    doc-expansion: none
    filter: true
    show-extensions: false
    show-common-extensions: false
    try-it-out-enabled: false
  group-configs:
    - group: 'public'
      display-name: '公开接口'
      paths-to-match: '/api/public/**'
    - group: 'admin'
      display-name: '管理接口'
      paths-to-match: '/api/admin/**'
    - group: 'auth'
      display-name: '认证接口'
      paths-to-match: '/api/auth/**'
    - group: 'monitoring'
      display-name: '监控接口'
      paths-to-match: '/api/monitoring/**'
  show-actuator: false

# 自定义健康检查配置
health:
  custom:
    enabled: true

# ========================================
# 插件配置 - 生产环境
# ========================================
plugin:
  # 存储插件配置
  storage:
    active: ${FILE_STORAGE_TYPE:oss}  # 生产环境推荐使用OSS
    fallback: local

  # 消息队列插件配置
  mq:
    active: ${MQ_TYPE:rabbitmq}
    fallback: memory

  # 通知渠道插件配置
  notification:
    enabled:
      - websocket  # WebSocket通知
      - email      # 邮件通知

  # 搜索插件配置
  search:
    active: ${SEARCH_TYPE:elasticsearch}  # 生产环境推荐使用Elasticsearch
    fallback: database

  # 评论插件配置
  comment:
    active: ${COMMENT_TYPE:builtin}
    fallback:

  # 定时任务插件配置
  scheduler:
    active: spring
    fallback:
